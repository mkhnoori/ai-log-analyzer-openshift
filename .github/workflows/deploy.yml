name: CD — Deploy to OpenShift Local

on:
  workflow_run:
    workflows: ["CI — Test & Lint"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    name: Build, push & deploy
    runs-on: self-hosted
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Ollama
        run: |
          curl -s --connect-timeout 5 http://localhost:11434 > /dev/null \
            || { echo "::error::Ollama not running"; exit 1; }
          echo "✓ Ollama running"

      - name: Start CRC if needed
        run: |
          STATUS=$(crc status 2>/dev/null | grep "CRC VM" | awk '{print $3}')
          [[ "$STATUS" == "Running" ]] || crc start
          echo "✓ CRC running"

      - name: Login to OpenShift
        run: |
          eval $(crc oc-env)
          PASS=$(cat "$HOME/.crc/machines/crc/kubeadmin-password")
          oc login -u kubeadmin -p "$PASS" \
            https://api.crc.testing:6443 \
            --insecure-skip-tls-verify=true
          echo "✓ Logged in as $(oc whoami)"

      - name: Ensure project exists
        run: |
          eval $(crc oc-env)
          oc get project ai-log-analyzer &>/dev/null || oc new-project ai-log-analyzer
          oc project ai-log-analyzer
          oc policy add-role-to-user \
            system:image-puller system:serviceaccount:ai-log-analyzer:default \
            -n ai-log-analyzer 2>/dev/null || true

      - name: Build image inside OpenShift
        run: |
          eval $(crc oc-env)
          # Create or update the BuildConfig
          oc get buildconfig ai-log-analyzer -n ai-log-analyzer &>/dev/null || \
            oc new-build \
              --name=ai-log-analyzer \
              --binary \
              --strategy=docker \
              --to=ai-log-analyzer:latest \
              -n ai-log-analyzer
          # Stream source code into the build
          oc start-build ai-log-analyzer \
            --from-dir=. \
            --follow \
            --wait \
            -n ai-log-analyzer
          echo "✓ Image built and pushed to internal registry"

      - name: Apply manifests
        run: |
          eval $(crc oc-env)
          oc apply -f openshift/configmap.yaml
          oc apply -f openshift/pvc.yaml
          # Patch deployment to use ImageStreamTag instead of external registry
          cat openshift/deployment.yaml | \
            sed 's|image-registry.openshift-image-registry.svc:5000/ai-log-analyzer/ai-log-analyzer:latest|image-registry.openshift-image-registry.svc:5000/ai-log-analyzer/ai-log-analyzer:latest|' | \
            oc apply -f -
          oc apply -f openshift/service.yaml
          oc apply -f openshift/route.yaml
          echo "✓ Manifests applied"

      - name: Rollout
        run: |
          eval $(crc oc-env)
          oc rollout restart deployment/ai-log-analyzer -n ai-log-analyzer
          oc rollout status deployment/ai-log-analyzer -n ai-log-analyzer --timeout=300s

      - name: Health check
        run: |
          eval $(crc oc-env)
          HOST=$(oc get route ai-log-analyzer -n ai-log-analyzer -o jsonpath='{.spec.host}')
          sleep 10
          STATUS=$(curl -sk "https://$HOST/health" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unreachable")
          echo "Health: $STATUS"
          echo "App URL: https://$HOST"

      - name: Summary
        if: always()
        run: |
          eval $(crc oc-env) 2>/dev/null || true
          oc get pods -n ai-log-analyzer 2>/dev/null || true
          oc get route ai-log-analyzer -n ai-log-analyzer 2>/dev/null || true
