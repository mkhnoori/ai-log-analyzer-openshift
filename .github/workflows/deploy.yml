name: CD — Deploy to OpenShift Local

on:
  workflow_run:
    workflows: ["CI — Test & Lint"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    name: Build, push & deploy
    runs-on: self-hosted
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Ollama
        run: |
          curl -s --connect-timeout 5 http://localhost:11434 > /dev/null \
            || { echo "::error::Ollama not running"; exit 1; }
          echo "✓ Ollama running"

      - name: Start CRC if needed
        run: |
          STATUS=$(crc status 2>/dev/null | grep "CRC VM" | awk '{print $3}')
          [[ "$STATUS" == "Running" ]] || crc start
          echo "✓ CRC running"

      - name: Login to OpenShift and registry
        run: |
          eval $(crc oc-env)

          # Get kubeadmin password from CRC's password file
          PASS=$(cat "$HOME/.crc/machines/crc/kubeadmin-password")
          echo "Password file read: ${#PASS} chars"

          # Login to get a token-based session
          oc login -u kubeadmin -p "$PASS" \
            https://api.crc.testing:6443 \
            --insecure-skip-tls-verify=true

          # Now get the token for podman
          TOKEN=$(oc whoami -t)
          echo "Token obtained: ${#TOKEN} chars"

          # Remove stale cert dir
          sudo rm -rf /etc/docker/certs.d/default-route-openshift-image-registry.apps-crc.testing 2>/dev/null || true

          # Login to registry
          podman login \
            -u kubeadmin \
            -p "$TOKEN" \
            default-route-openshift-image-registry.apps-crc.testing \
            --tls-verify=false
          echo "✓ Registry login successful"

      - name: Ensure project and registry
        run: |
          eval $(crc oc-env)
          oc get project ai-log-analyzer &>/dev/null || oc new-project ai-log-analyzer
          oc project ai-log-analyzer
          oc patch configs.imageregistry.operator.openshift.io/cluster \
            --patch='{"spec":{"defaultRoute":true}}' --type=merge 2>/dev/null || true
          oc policy add-role-to-user \
            system:image-puller system:serviceaccount:ai-log-analyzer:default \
            -n ai-log-analyzer 2>/dev/null || true
          sleep 5

      - name: Build image
        run: |
          podman build -t ai-log-analyzer:latest .
          podman tag ai-log-analyzer:latest \
            default-route-openshift-image-registry.apps-crc.testing/ai-log-analyzer/ai-log-analyzer:latest
          echo "✓ Build complete"

      - name: Push image
        run: |
          podman push \
            default-route-openshift-image-registry.apps-crc.testing/ai-log-analyzer/ai-log-analyzer:latest \
            --tls-verify=false
          echo "✓ Push complete"

      - name: Apply manifests
        run: |
          eval $(crc oc-env)
          oc apply -f openshift/configmap.yaml
          oc apply -f openshift/pvc.yaml
          oc apply -f openshift/deployment.yaml
          oc apply -f openshift/service.yaml
          oc apply -f openshift/route.yaml
          echo "✓ Manifests applied"

      - name: Rollout
        run: |
          eval $(crc oc-env)
          oc rollout restart deployment/ai-log-analyzer -n ai-log-analyzer
          oc rollout status deployment/ai-log-analyzer -n ai-log-analyzer --timeout=300s

      - name: Health check
        run: |
          eval $(crc oc-env)
          HOST=$(oc get route ai-log-analyzer -n ai-log-analyzer -o jsonpath='{.spec.host}')
          sleep 10
          curl -sk "https://$HOST/health" | python3 -c "import sys,json; print(json.load(sys.stdin))"
          echo "App URL: https://$HOST"

      - name: Summary
        if: always()
        run: |
          eval $(crc oc-env) 2>/dev/null || true
          oc get pods -n ai-log-analyzer 2>/dev/null || true
