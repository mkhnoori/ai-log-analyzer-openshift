apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-log-analyzer-config
  namespace: ai-log-analyzer
  labels:
    app: ai-log-analyzer
data:
  # Ollama runs on your Mac host — accessible via host.crc.testing from inside pods
  # when crc config set host-network-access true is set
  OLLAMA_BASE_URL: "http://host.crc.testing:11434"
  LLM_MODEL: "llama3.1:8b"
  EMBED_MODEL: "nomic-embed-text"

  # ChromaDB persists to the PersistentVolumeClaim mounted at /app/data
  CHROMA_PERSIST_DIR: "/app/data/chroma"
  CHROMA_COLLECTION: "log_incidents"

  # Chunking settings
  CHUNK_SIZE: "512"
  CHUNK_OVERLAP: "64"

  # RAG settings
  RAG_TOP_K: "5"
  RAG_MIN_SIMILARITY: "0.72"

  # Server settings
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  LOW_CONFIDENCE_THRESHOLD: "0.6"
